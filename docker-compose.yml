services:
  blunder-tutor:
    build:
      context: .
    container_name: blunder-tutor
    # UID:GID pinned to the appuser baked into the image. Pin here as
    # well so bind-mount ownership (./data) on the host stays readable
    # by the host developer account without a chown dance.
    user: "1000:1000"
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      # Optional: Pre-configure usernames to skip setup screen
      - LICHESS_USERNAME=${LICHESS_USERNAME:-}
      - CHESSCOM_USERNAME=${CHESSCOM_USERNAME:-}

      # Engine configuration
      - STOCKFISH_BINARY=/usr/local/bin/stockfish
      - STOCKFISH_DEPTH=${STOCKFISH_DEPTH:-14}

      # Demo mode (rate-limits engine endpoints, blocks mutations)
      # - DEMO_MODE=true
      # - DEMO_THROTTLE_RATE=30/60  # requests/seconds per IP (default: 30/60)

      # Override database path (e.g. to use embedded demo DB)
      # - DB_PATH=/app/demo/demo.sqlite3

      # Server configuration
      - HOST=0.0.0.0
      - PORT=8000
    restart: unless-stopped
    healthcheck:
      test:
        ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
