[flake8]
# wemake-python-styleguide config. Ruff is the primary linter + formatter
# (see [tool.ruff] in pyproject.toml). flake8 here exists only to host WPS
# rules that ruff does not implement (cognitive complexity, await-in-for,
# mutable module constants, inconsistent returns, etc.).
#
# Rollout phases tracked in EPIC-4 / docs/quality/wps-poc.md:
#   Phase 1:  defaults, warning-only CI.                             [done]
#   Phase 2a: disable noisy rules (Group A).                         [done]
#   Phase 2b: relax thresholds (Group B).                            [done]
#   Phase 3:  fix Group C real-bug rules.                            [done]
#   Phase 4:  fix Group D code-quality rules.                        [done]
#   Phase 5:  flip CI to merge-blocking.
select = WPS

# Group B — threshold tuning. Defaults are calibrated for small,
# pure-function libraries; this codebase is async FastAPI with services
# and handlers that legitimately exceed the upstream ceilings. New values
# are still strict — they target real outliers rather than every handler.
max-local-variables = 8
max-arguments = 7
max-expressions = 12
max-methods = 12
max-await-expressions = 8
max-cognitive-score = 15
max-cognitive-average = 10
max-import-from-members = 12
max-try-body-length = 3
max-line-complexity = 18
max-module-members = 10
max-imports = 15

# Group A — disabled globally because they fire on intentional patterns:
#   WPS110 — banned names (`data`, `value`, `result`, `items`) collide with
#            domain vocabulary; the curated list is too opinionated.
#   WPS111 — `f` (file handle), `e` (exception), `T`/`V` (TypeVar),
#            `_` (throwaway) are Pythonic.
#   WPS115 — upper-case constants inside classes (e.g., `EXEMPT_PATHS`) are
#            clearer than camelCase.
#   WPS114 — underscored numbers in pytest names (e.g.,
#            `test_..._409_username_taken`) describe the assertion target.
#   WPS118 — long pytest test names communicate intent.
#   WPS226 — repeating short literals (HTTP methods, classification labels)
#            is intentional.
#   WPS358 — `0.0` is fine to mark explicit float intent.
#   WPS363 — `raise SystemExit` is idiomatic in CLI argparse subparsers.
#   WPS412 — `__init__.py` modules with small helpers + re-exports are
#            standard.
#   WPS430 — nested functions for factories/decorators/closures are common;
#            re-evaluate per-file in Phase 4 if a hotspot emerges.
#   WPS301/WPS458 — `import chess.engine` / `import chess.pgn` is the
#            documented python-chess convention; the library exposes
#            submodules used as `chess.engine.UciProtocol`. Many files
#            also need top-level `chess` (chess.WHITE, chess.Move), so
#            having both `import chess` and `import chess.engine` is
#            unavoidable and idiomatic per the python-chess docs.
#   WPS404 — fires on FastAPI's canonical `Path(...)`, `Query(...)`,
#            `Body(...)` dependency markers used as parameter defaults.
#            FastAPI re-evaluates them per-request; the "complex default
#            value" warning is wrong-shape for the framework.
#   WPS410 — opposes `__all__` as a concept. We use `__all__` to mark
#            public APIs (auth library shape, pipeline step exports);
#            mypy/IDE tooling honors it for `from x import *` and
#            re-export visibility.
#   WPS420 — fires on `pass` (stub bodies for ABCs / no-op backends) and
#            `del` (legitimate dict cleanup, scope hygiene). Both are
#            standard Python; the upstream `...` (Ellipsis) preference
#            is stylistic, not a correctness signal.
#   WPS476 — wrong-shape for this architecture. The rule's intent is "you
#            might have meant `asyncio.gather`", but every site in this
#            codebase is one of: (a) SQLite writes serialized by a single
#            connection — gather would break atomicity or just queue at
#            the writer; (b) rate-limited external HTTP with cursor-based
#            pagination and early-break on `max_games`; (c) event/queue
#            consumers that are sequential by design; (d) one-shot await
#            on first-match pattern (middleware). 56 hits, 0 real fixes.
#   WPS504 — opinionated. Most hits are `X if Y is not None else D` —
#            "is-not-None" reads naturally as "do it when we have a
#            value." Flipping for the rule's sake hurts readability.
#   WPS527 — stylistic preference between `frozenset({x})` and
#            `frozenset((x,))`. The set-literal form is at least as
#            readable; the rule's claim that it's "not a tuple" describes
#            an arg shape, not a defect.
#   WPS237 — fires on f-strings containing method calls or short
#            comprehensions (e.g., `f"({' + '.join(parts)})"`). Hoisting
#            to a named local for the rule's sake costs more readability
#            than it saves.
#   WPS602 — opposes `@staticmethod` as a concept. Static methods inside
#            a class are a valid Python organizing tool (especially for
#            stateless helpers logically associated with the class).
#   WPS615 — opposes `get_*` / `set_*` method names. Our service classes
#            use these names for read/write operations that don't fit
#            cleanly as `@property` (async, side-effecting, or
#            multi-arg). Renaming repo-wide is large for marginal value.
extend-ignore =
    WPS110,
    WPS111,
    WPS114,
    WPS115,
    WPS118,
    WPS226,
    WPS237,
    WPS301,
    WPS358,
    WPS363,
    WPS404,
    WPS410,
    WPS412,
    WPS420,
    WPS430,
    WPS458,
    WPS476,
    WPS504,
    WPS527,
    WPS602,
    WPS615

# Per-tree relaxations. Tests need many asserts (WPS218), float compares
# (WPS459), and routinely have more locals/methods/awaits than production
# handlers. The complexity ceilings (WPS210/211/214/217) are tuned in
# Phase 2b for production code; tests get a bigger pass. WPS204
# (overused expression) is suppressed in tests because pytest cases set
# up similar scenarios with repeated factory calls / fixture invocations.
per-file-ignores =
    # Tests use mutable factory state and string concat in fixtures; both
    # are intentional, plus tests already escape the per-test rules.
    tests/*: WPS204, WPS210, WPS211, WPS214, WPS217, WPS218, WPS336, WPS407, WPS432, WPS459
    # CLI scripts are operator-facing; `print()` is the right output channel.
    blunder_tutor/cli/*: WPS421
    # Repositories build SQL via `query += " AND col = ?"` for safe
    # parameter binding. f-string SQL is an injection risk; pre-joining
    # all clauses is more verbose and harder to read than the idiom.
    blunder_tutor/repositories/*: WPS336

extend-exclude =
    .venv,
    node_modules,
    alembic/versions,
    frontend,
    e2e,
    landing,
    profiling,
    prof,
    test-results,
    .playwright-mcp,
    data,
    fixtures,
    images,
    demo,
    docs,
    scripts
