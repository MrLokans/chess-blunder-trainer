[flake8]
# wemake-python-styleguide config. Ruff is the primary linter + formatter
# (see [tool.ruff] in pyproject.toml). flake8 here exists only to host WPS
# rules that ruff does not implement (cognitive complexity, await-in-for,
# mutable module constants, inconsistent returns, etc.).
#
# Rollout phases tracked in EPIC-4 / docs/quality/wps-poc.md:
#   Phase 1:  defaults, warning-only CI.                             [done]
#   Phase 2a: disable noisy rules (Group A).                         [done]
#   Phase 2b: relax thresholds (Group B).                            [done]
#   Phase 3:  fix Group C real-bug rules.                            [done]
#   Phase 4:  fix Group D code-quality rules.                        [done]
#   Phase 5:  flip CI to merge-blocking.
select = WPS

# Group B — threshold tuning. Defaults are calibrated for small,
# pure-function libraries; this codebase is async FastAPI with services
# and handlers that legitimately exceed the upstream ceilings. New values
# are still strict — they target real outliers rather than every handler.
max-local-variables = 8
max-arguments = 7
max-expressions = 12
max-methods = 12
max-await-expressions = 8
max-cognitive-score = 15
max-cognitive-average = 10
max-import-from-members = 12
max-try-body-length = 3
max-line-complexity = 18
max-module-members = 10
max-imports = 15

# WPS110: re-enable with curated allowlist of names that are
# Pythonic / library-driven in this codebase (TREK-80 rule 7 audit):
#   params, value(s), item(s), info, data, result(s) — SQL parameter
#   binding, cache/dict APIs, dict iteration, python-chess `InfoDict`,
#   event-payload convention, function return value. The default WPS110
#   list bans them outright; allowlisting carries them out of the banned
#   set while still catching `temp`, `val`, `_data`, `cur`, etc.
allowed-domain-names =
    params,
    value,
    values,
    item,
    items,
    info,
    data,
    result,
    results,
    handler,
    # Single-letter idiomatic loop / convention names (TREK-80 rule 8):
    #   e — `except Exception as e`
    #   i, n, m, k — loop indices, counters
    #   t — trap / time / token in iteration
    #   w — weakness in iteration
    #   v — TypeVar (also `value` in tuple unpacks)
    #   p — piece / pin / position in iteration
    #   g — game in iteration
    #   f — file handle / feature in iteration
    #   d — dependency in iteration
    #   u — user / unit in iteration
    #   r — row / response in iteration
    #   h — hash in iteration
    #   b — blunder / board in iteration
    #   a, c, s, x, y, o, q — generic single-letter loop vars
    #   T, V — TypeVar uppercase convention
    e, i, n, m, k, t, w, v, p, g, f, d, u, r, h, b, a, c, s, x, y, o, q, T, V,
    # i18n / gettext convention: `_t(key, **kwargs)` is the conventional
    # alias for the per-test translation helper (mirrors `gettext` `_`).
    _t,
    # Underscore-prefixed loop throwaways and Pydantic-style sentinels.
    _

# Group A — disabled globally because they fire on intentional patterns:
#   WPS114 — underscored numbers in pytest names (e.g.,
#            `test_..._409_username_taken`) describe the assertion target.
#            Audited 2026-04-26 (TREK-80, rule 10): 34 hits, all in test
#            names where the embedded HTTP status code or count is what
#            the test asserts. User-confirmed leave silenced.
#   WPS118 — long pytest test names communicate intent. Audited
#            2026-04-26 (TREK-80, rule 11): 68 hits, all under tests/,
#            all descriptive names (e.g.,
#            `test_per_user_settings_persist_to_separate_databases`)
#            where the length is exactly the assertion description.
#            Renaming would require a comment to recover the meaning the
#            name already carries. User-confirmed leave silenced.
#   WPS358 — `0.0` is fine to mark explicit float intent. Audited
#            2026-04-27 (TREK-80, rule 14): 42 hits, all `0.0` literals
#            in stats/accuracy/percentage code where the float type is
#            load-bearing — `accuracy = total / n if n else 0.0`,
#            SQL `COALESCE(rate, 0.0)`, division-fallback sentinels in
#            `utils/accuracy.py`, `repositories/stats_repository.py` (24
#            hits), `puzzle_attempt_repository.py`, plus pytest fixtures
#            seeding float inputs. Collapsing to `0` would either change
#            the expression type or read as an int sentinel. User-
#            confirmed leave silenced.
#   WPS363 — `raise SystemExit` is idiomatic in CLI argparse subparsers.
#            Audited 2026-04-27 (TREK-80, rule 15): 11 hits, all in
#            `cli/auth.py`. 8 are `except FooError as exc: raise
#            SystemExit(msg) from exc` — preserve the exception chain
#            for operator debugging (`sys.exit` cannot chain via
#            `from exc`, the cause is lost). The other 3 are validation
#            guards (`raise SystemExit("...: no TTY attached")`) kept
#            in the same form so the file has one exit style.
#            User-confirmed leave silenced.
#   WPS412 — fires on every `__init__.py` that contains anything beyond
#            bare `from x import y`, including re-export aggregators with
#            `__all__`, module docstrings, and `from __future__ import`.
#            Audited 2026-04-26 (TREK-80, rule 4): 9 of 12 hits are pure
#            re-export packages where the rule is wrong-shape; the other
#            three (`SqliteStorage` class in `auth/storage_sqlite/`,
#            `get_all_steps()` factory in `analysis/pipeline/steps/`,
#            `USER_AGENT` constant in `fetchers/`) are co-located by
#            design — moving them to a sibling module to satisfy the rule
#            adds an indirection without improving anything. User-
#            confirmed leave silenced.
#   (WPS301, WPS458 are now scoped to per-file-ignores; rationale lives
#   alongside the per-file entries below.)
#   WPS404 — fires on FastAPI's canonical `Path(...)`, `Query(...)`,
#            `Body(...)` dependency markers used as parameter defaults.
#            FastAPI re-evaluates them per-request; the "complex default
#            value" warning is wrong-shape for the framework. Audited
#            2026-04-27 (TREK-80, rule 16): 13 hits, two patterns:
#            (1) FastAPI markers — 9 hits in `web/api/jobs.py` (7) and
#            `web/api/starred.py` (2): `Path(description=...)`,
#            `Query(default=..., ge=..., le=...)`, `Query(None, alias=...)`.
#            (2) Test fixture `timedelta(days=N)` defaults — 4 hits in
#            `tests/auth/conftest.py` (2) and `tests/helpers/auth.py` (2):
#            `session_max_age: timedelta = timedelta(days=30)` etc.
#            `timedelta` is immutable (like `tuple`, `frozenset`,
#            `datetime.date`), so the classic shared-mutable-default
#            trap does not apply; refactoring to module constants would
#            lose the inline readability without removing any hazard.
#            Zero hits are genuine mutable-default or expensive-call
#            smells. User-confirmed leave silenced.
#   (WPS410 is now scoped to per-file-ignores for the auth library;
#   rationale lives alongside the per-file entries below.)
#   WPS420 — collapses 4 keywords (`pass`, `nonlocal`, `global`, `del`)
#            into one rule code. Audited 2026-04-27 (TREK-80, rule 18):
#            40 hits = 17 `pass` + 21 `nonlocal` + 2 `global` + 0 `del`.
#            `pass`: stub bodies for ABCs (`cli/base.py`), Null-object
#            backends (`cache/backend.py` 5 sites), no-op auth hooks
#            (`auth/core/service.py`), exception/dataclass scaffolds —
#            the upstream `...` preference is stylistic. `nonlocal`:
#            closure-mutation pattern in async-job progress counters
#            and test fixtures verifying cache hit/miss — idiomatic
#            Python, no `nonlocal`-free rewrite is clearer. `global`:
#            2 sites (`auth/core/hashers.py` lazy hasher singleton,
#            `cache/decorator.py` boot-time cache backend) — IS a
#            real signal but ruff `PLW0603` catches it more granularly
#            than WPS420; PLW0603 is now in the ruff select list and
#            both intentional sites carry per-line noqa with reason.
#            User-confirmed leave silenced.
#   WPS476 — wrong-shape for this architecture. The rule's intent is "you
#            might have meant `asyncio.gather`", but every site in this
#            codebase is one of: (a) SQLite writes serialized by a single
#            connection — gather would break atomicity or just queue at
#            the writer; (b) rate-limited external HTTP with cursor-based
#            pagination and early-break on `max_games`; (c) event/queue
#            consumers that are sequential by design; (d) one-shot await
#            on first-match pattern (middleware). 56 hits, 0 real fixes.
#            Re-confirmed 2026-04-27 (TREK-80, rule 19): user-confirmed
#            leave silenced, no architectural change since prior audit.
#   WPS504 — opinionated. Most hits are `X if Y is not None else D` —
#            "is-not-None" reads naturally as "do it when we have a
#            value." Flipping for the rule's sake hurts readability.
#            Re-confirmed 2026-04-27 (TREK-80, rule 20): user-confirmed
#            leave silenced.
#   (WPS527 was re-enabled 2026-04-27, TREK-80 rule 21: all 13 sites
#   rewritten to tuple-literal form `frozenset((x,))` for one-arg-shape
#   consistency.)
#   WPS237 — fires on f-strings containing method calls or short
#            comprehensions (e.g., `f"({' + '.join(parts)})"`). Hoisting
#            to a named local for the rule's sake costs more readability
#            than it saves. Audited 2026-04-26 (TREK-80, rule 12): 22
#            hits across 17 logical sites, every one a documented
#            wrong-shape pattern — short `', '.join(...)`, arithmetic +
#            format spec (`f"{cp / CENTIPAWNS_PER_PAWN:+.2f}"`), short
#            method chain (`{missed.description.lower()}`), English
#            plural ternary, or multi-field tab record. None contain
#            nested f-strings or multi-statement comprehensions. User-
#            confirmed leave silenced.
extend-ignore =
    WPS114,
    WPS118,
    WPS237,
    WPS358,
    WPS363,
    WPS404,
    WPS412,
    WPS420,
    WPS476,
    WPS504

# Per-tree relaxations. Tests need many asserts (WPS218), float compares
# (WPS459), and routinely have more locals/methods/awaits than production
# handlers. The complexity ceilings (WPS210/211/214/217) are tuned in
# Phase 2b for production code; tests get a bigger pass. WPS204
# (overused expression) is suppressed in tests because pytest cases set
# up similar scenarios with repeated factory calls / fixture invocations.
# Per-rule audit confirmations (TREK-80, rules 22a–22i):
#   WPS210 — re-confirmed 2026-04-27. 5 hits, all integration tests
#            (test_isolation.py, test_per_user_jobs.py ×2,
#            test_providers.py, test_integration_analysis.py) where the
#            local-variable count IS the multi-step scenario complexity
#            (e.g., 17 locals in `test_user_a_jobs_do_not_appear_in_user_b_db`
#            for a 2-user × 2-job × 4-cross-check isolation matrix).
#            Refactoring trades local count for fixture complexity with
#            no real-bug benefit. User-confirmed leave silenced.
#   WPS211 — re-confirmed 2026-04-27. 4 hits, all schema-mirror factories
#            in test helpers: `make_blunder` (16 args = `analysis_moves`
#            row width), `insert_test_game` (10 = `game_index_cache` +
#            `analysis_games` columns), `insert_test_move` (12 =
#            `analysis_moves` columns), `_seed_blunder_game` (16 = arg
#            union of the two inserts). The 7-arg threshold is calibrated
#            for production handlers; for schema-mirror factories args
#            equal SQL row width. User-confirmed leave silenced.
#   WPS214/WPS217/WPS218/WPS336/WPS407/WPS432/WPS459 — bulk-confirmed
#            2026-04-27 (TREK-80 rule 22c–22i): user-confirmed leave
#            silenced for the entire `tests/*` tree without per-rule
#            sampling. Test files legitimately have more methods on a
#            test class (WPS214), more cognitive complexity per test
#            (WPS217), many `assert` statements per test (WPS218),
#            string concat in fixtures (WPS336), mutable factory state
#            (WPS407), magic numbers as test inputs (WPS432), and float
#            comparisons in eval-threshold tests (WPS459). The
#            production-calibrated thresholds and patterns don't fit
#            test code, where each one would force fragmenting the
#            test or pulling values into named constants that obscure
#            the input/output relationship under test.
per-file-ignores =
    # Tests use mutable factory state and string concat in fixtures; both
    # are intentional, plus tests already escape the per-test rules.
    # WPS301/WPS458: python-chess library convention (chess.engine, chess.pgn,
    # chess.polyglot) + httpx ASGITransport canonical pattern for FastAPI tests.
    tests/*: WPS204, WPS210, WPS211, WPS214, WPS217, WPS218, WPS226, WPS301, WPS336, WPS407, WPS430, WPS432, WPS458, WPS459
    # CLI scripts are operator-facing; `print()` is the right output channel.
    # Audited 2026-04-27 (TREK-80, rule 23): 23 hits across 8 CLI files,
    # all operator-facing UX (completion confirmations, list rows, result
    # summaries, errors, status indicators). Zero debug-style tracing
    # that should route to `logger.info`. User-confirmed leave silenced.
    blunder_tutor/cli/*: WPS421
    # Repositories build SQL via `query += " AND col = ?"` for safe
    # parameter binding. f-string SQL is an injection risk; pre-joining
    # all clauses is more verbose and harder to read than the idiom.
    # WPS226: SQL placeholder `?`, column names, clause fragments, and
    # result-dict keys are repeated by design — they are the wire format.
    # WPS301: game_repository.py uses `import chess.pgn` (python-chess).
    # WPS336: audited 2026-04-27 (TREK-80, rule 24). 46 hits across 3
    # repos (`game_repository.py` 24, `stats_repository.py` 19,
    # `job_repository.py` 3), all SQL clause-fragment concat with `?`
    # parameter binding (safe — not f-string interpolation). User-stated
    # preference is for object-based query construction; the rule is
    # technically correct that string concat is the smell, but the
    # idiomatic raw-aiosqlite pattern has no in-codebase replacement.
    # A pypika-based alternative is tracked in TREK-81 (spike); until
    # that lands, WPS336 stays silenced for this tree.
    blunder_tutor/repositories/*: WPS226, WPS301, WPS336
    # WPS226 here is FastAPI/OpenAPI metadata (`description`, `model`,
    # `summary`, response detail strings) plus response-dict field names.
    # Each handler file legitimately repeats the same metadata keys for
    # every endpoint; extracting wouldn't reduce repetition, only hide it.
    blunder_tutor/web/api/*: WPS226
    # explanation.py's `I18nMessage(params={...})` calls share the same
    # parameter names (`san`, `piece`, `line`, `square`, `acc`) by design —
    # each is the variable slot exposed to the i18n template; renaming a
    # param breaks the corresponding locale key.
    blunder_tutor/utils/explanation.py: WPS226
    # python-chess submodule imports — TREK-80 rule 13 (audited 2026-04-27).
    # WPS301 ("dotted raw import: chess.engine|pgn|polyglot") is the
    # documented library convention; submodules expose types used as
    # `chess.engine.UciProtocol`, `chess.pgn.read_game`. WPS458 ("imports
    # collision: chess") fires whenever a file needs BOTH `import chess`
    # (for `chess.WHITE`, `chess.Move`) and `import chess.engine` — both
    # forms are required by python-chess. Audit confirmed every WPS301 hit
    # in prod is python-chess; non-chess WPS458 hits in `web/config.py`,
    # `web/auth_hooks.py`, and `auth/__init__.py` were either fixed
    # (typing/constants/secure_fs imports cleaned) or per-line noqa'd
    # (auth/__init__.py intentional re-export). Per-file-ignores listed
    # here keep the rules live everywhere else.
    blunder_tutor/analysis/*: WPS301, WPS458
    blunder_tutor/analysis/pipeline/*: WPS301, WPS458
    blunder_tutor/analysis/pipeline/steps/*: WPS301, WPS458
    blunder_tutor/background/jobs/*: WPS301
    blunder_tutor/fetchers/lichess.py: WPS301
    blunder_tutor/services/*: WPS301, WPS458
    blunder_tutor/utils/chess_utils.py: WPS301, WPS458
    blunder_tutor/utils/pgn_utils.py: WPS301, WPS458
    blunder_tutor/web/app.py: WPS301
    blunder_tutor/web/api/import_game.py: WPS301
    # WPS410 — `__all__` is allowed only inside the auth library, which
    # is structured as a publishable plug-and-play package (TREK-56 /
    # EPIC-3 P4.1). `__all__` here is the public-API contract: consumers
    # reach in via `blunder_tutor.auth` / `blunder_tutor.auth.fastapi`
    # and the listed names are the supported surface — implementation
    # details may move between subpackages without notice. TREK-80
    # rule 17 (audited 2026-04-27) dropped `__all__` from 11 non-auth
    # sites (7 `__init__.py` aggregators + 4 module-level decorative
    # exports) where the marker was cargo-cult.
    blunder_tutor/auth/__init__.py: WPS410
    blunder_tutor/auth/core/protocols.py: WPS410
    blunder_tutor/auth/fastapi/__init__.py: WPS410
    blunder_tutor/auth/fastapi/protocols.py: WPS410
    blunder_tutor/auth/providers/__init__.py: WPS410
    blunder_tutor/auth/providers/base.py: WPS410
    blunder_tutor/web/dependencies.py: WPS301

extend-exclude =
    .venv,
    node_modules,
    alembic/versions,
    frontend,
    e2e,
    landing,
    profiling,
    prof,
    test-results,
    .playwright-mcp,
    data,
    fixtures,
    images,
    demo,
    docs,
    scripts
