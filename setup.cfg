[flake8]
# wemake-python-styleguide config. Ruff is the primary linter + formatter
# (see [tool.ruff] in pyproject.toml). flake8 here exists only to host WPS
# rules that ruff does not implement (cognitive complexity, await-in-for,
# mutable module constants, inconsistent returns, etc.).
#
# Rollout phases tracked in EPIC-4 / docs/quality/wps-poc.md:
#   Phase 1:  defaults, warning-only CI.                             [done]
#   Phase 2a: disable noisy rules (Group A).                         [done]
#   Phase 2b: relax thresholds (Group B).                            [done]
#   Phase 3:  fix Group C real-bug rules.                            [done]
#   Phase 4:  fix Group D code-quality rules.
#   Phase 5:  flip CI to merge-blocking.
select = WPS

# Group B — threshold tuning. Defaults are calibrated for small,
# pure-function libraries; this codebase is async FastAPI with services
# and handlers that legitimately exceed the upstream ceilings. New values
# are still strict — they target real outliers rather than every handler.
max-local-variables = 8
max-arguments = 7
max-expressions = 12
max-methods = 12
max-await-expressions = 8
max-cognitive-score = 15
max-cognitive-average = 10
max-import-from-members = 12
max-try-body-length = 3
max-line-complexity = 18
max-module-members = 10
max-imports = 15

# Group A — disabled globally because they fire on intentional patterns:
#   WPS110 — banned names (`data`, `value`, `result`, `items`) collide with
#            domain vocabulary; the curated list is too opinionated.
#   WPS111 — `f` (file handle), `e` (exception), `T`/`V` (TypeVar),
#            `_` (throwaway) are Pythonic.
#   WPS115 — upper-case constants inside classes (e.g., `EXEMPT_PATHS`) are
#            clearer than camelCase.
#   WPS114 — underscored numbers in pytest names (e.g.,
#            `test_..._409_username_taken`) describe the assertion target.
#   WPS118 — long pytest test names communicate intent.
#   WPS204 — FastAPI `Depends(...)` repeats by design.
#   WPS226 — repeating short literals (HTTP methods, classification labels)
#            is intentional.
#   WPS358 — `0.0` is fine to mark explicit float intent.
#   WPS363 — `raise SystemExit` is idiomatic in CLI argparse subparsers.
#   WPS412 — `__init__.py` modules with small helpers + re-exports are
#            standard.
#   WPS430 — nested functions for factories/decorators/closures are common;
#            re-evaluate per-file in Phase 4 if a hotspot emerges.
#   WPS432 — magic numbers like HTTP statuses (302/303/401/403/404) and
#            well-known constants are clearer inline; the noise on tests is
#            catastrophic.
#   WPS501 — `try/finally` without `except` is the idiomatic synchronous
#            cleanup pattern in this codebase (close repo / close conn /
#            stop coordinator). The rule's intent — "did you forget an
#            `except`?" — never matches; the cleanup is deliberate and
#            equivalent context-manager refactors require renaming
#            `close` → `aclose` repo-wide, which is a larger change than
#            this rule warrants.
#   WPS509 — fires on `(A if c else B)` inside any larger expression even
#            when the ternary is fully parenthesized; also on CLDR plural
#            rules in i18n/manager.py where the chain is intentional.
extend-ignore =
    WPS110,
    WPS111,
    WPS114,
    WPS115,
    WPS118,
    WPS204,
    WPS226,
    WPS358,
    WPS363,
    WPS412,
    WPS430,
    WPS432,
    WPS501,
    WPS509

# Per-tree relaxations. Tests need many asserts (WPS218), float compares
# (WPS459), and routinely have more locals/methods/awaits than production
# handlers. The complexity ceilings (WPS210/211/214/217) are tuned in
# Phase 2b for production code; tests get a bigger pass.
per-file-ignores =
    tests/*: WPS210, WPS211, WPS214, WPS217, WPS218, WPS459

extend-exclude =
    .venv,
    node_modules,
    alembic/versions,
    frontend,
    e2e,
    landing,
    profiling,
    prof,
    test-results,
    .playwright-mcp,
    data,
    fixtures,
    images,
    demo,
    docs,
    scripts
