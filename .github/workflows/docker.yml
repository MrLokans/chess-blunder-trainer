name: Docker

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io

jobs:
  build-and-test:
    name: Build, E2E, Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-name: ${{ steps.image.outputs.name }}
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image name to lowercase
        id: image
        run: echo "name=${{ env.REGISTRY }}/${GITHUB_REPOSITORY_OWNER,,}/blunder-tutor" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
            type=raw,value=latest

      # Build for amd64 only and load into local Docker for e2e testing
      - name: Build image for testing
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: blunder-tutor:e2e-test
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            STOCKFISH_VERSION=sf_17
          cache-from: |
            type=gha
            type=registry,ref=${{ steps.image.outputs.name }}:buildcache

      - name: Start container
        run: |
          cp demo/demo.sqlite3 /tmp/e2e-test.sqlite3
          # Container runs as appuser (uid 1000); GH-hosted runners are uid 1001.
          # Without this, the bind-mounted DB is read-only to the container user
          # and migrations fail with "attempt to write a readonly database".
          sudo chown 1000:1000 /tmp/e2e-test.sqlite3
          docker run -d --name e2e-app \
            -p 8000:8000 \
            -v /tmp/e2e-test.sqlite3:/app/data/main.sqlite3 \
            blunder-tutor:e2e-test
          # Wait for health check
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "App is ready"
              break
            fi
            echo "Waiting for app... ($i/30)"
            sleep 2
          done
          curl -sf http://localhost:8000/health || (docker logs e2e-app && exit 1)

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: e2e/package-lock.json

      - name: Install Playwright
        working-directory: e2e
        run: npm ci && npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: e2e
        run: npx playwright test
        env:
          E2E_BASE_URL: http://localhost:8000

      - name: Stop container
        if: always()
        run: docker stop e2e-app && docker logs e2e-app

      # E2E passed — rebuild multi-platform and push
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            STOCKFISH_VERSION=sf_17
          cache-from: |
            type=gha
            type=registry,ref=${{ steps.image.outputs.name }}:buildcache
          cache-to: |
            type=gha,mode=max
            type=registry,ref=${{ steps.image.outputs.name }}:buildcache,mode=max

  release:
    name: Create GitHub Release
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Docker

            ```bash
            docker run -p 8000:8000 -v $(pwd)/data:/app/data ${{ needs.build-and-test.outputs.image-name }}:${{ github.ref_name }}
            ```

            Platforms: `linux/amd64`, `linux/arm64`
